<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mb-backlog - Task List - 1.0</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="wireframe-container">
      <div class="wireframe-header">
        <div class="wireframe-logo">mb-backlog</div>
        <div class="wireframe-nav">
          <div>Tasks</div>
        </div>
      </div>
      <div class="wireframe-main">
        <div class="wireframe-content">
          <div class="wireframe-section">
            <div class="wireframe-section-header">
              <div class="wireframe-section-title">My Tasks</div>
              <button class="wireframe-section-action">Create New Task</button>
            </div>
            <table style="width: 100%; border-collapse: collapse">
              <thead>
                <tr style="border-bottom: 2px solid #ddd">
                  <th style="padding: 2px 6px; text-align: left">Code</th>
                  <th style="padding: 2px 6px; text-align: left">Title</th>
                  <th style="padding: 2px 6px; text-align: left">State</th>
                  <th style="padding: 2px 12px; text-align: right">Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr style="border-bottom: 1px solid #eee">
                  <td style="padding: 2px 6px">TASK-001</td>
                  <td style="padding: 2px 6px">
                    Implement user authentication
                  </td>
                  <td style="padding: 2px 6px">In Progress</td>
                  <td style="padding: 2px 12px; text-align: right">
                    <button class="wireframe-button-secondary">View</button>
                    <button class="wireframe-button-secondary">Edit</button>
                    <button class="wireframe-button-secondary">Delete</button>
                  </td>
                </tr>
                <tr style="border-bottom: 1px solid #eee">
                  <td style="padding: 2px 6px">TASK-002</td>
                  <td style="padding: 2px 6px">Create dashboard</td>
                  <td style="padding: 2px 6px">To Do</td>
                  <td style="padding: 2px 12px; text-align: right">
                    <button class="wireframe-button-secondary">View</button>
                    <button class="wireframe-button-secondary">Edit</button>
                    <button class="wireframe-button-secondary">Delete</button>
                  </td>
                </tr>
                <tr style="border-bottom: 1px solid #eee">
                  <td style="padding: 2px 6px">TASK-003</td>
                  <td style="padding: 2px 6px">Test API endpoints</td>
                  <td style="padding: 2px 6px">Done</td>
                  <td style="padding: 2px 12px; text-align: right">
                    <button class="wireframe-button-secondary">View</button>
                    <button class="wireframe-button-secondary">Edit</button>
                    <button class="wireframe-button-secondary">Delete</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="wireframe-footer">Tasks: 3 | DB Size: 2.3 KB</div>
    </div>
  </body>
</html>
