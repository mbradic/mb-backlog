<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      mb-backlog - Filter Panel - 1.0
    </title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="wireframe-container">
      <div class="wireframe-header">
        <div class="wireframe-logo">mb-backlog</div>
        <div class="wireframe-nav">
          <div>Dashboard</div>
          <div>Tasks</div>
          <div>Settings</div>
        </div>
      </div>
      <div class="wireframe-main">
        <div class="wireframe-content">
          <div class="wireframe-section">
            <div class="wireframe-section-header">
              <div class="wireframe-section-title">Filters</div>
              <div class="wireframe-section-action">Clear All</div>
            </div>
            <div class="wireframe-item" style="padding: 15px; border: 1px solid #ddd; margin-bottom: 10px;">
              <strong>Code:</strong><br/>
              <input type="text" placeholder="Enter task code" style="width: 100%; padding: 5px; box-sizing: border-box;"/>
            </div>
            <div class="wireframe-item" style="padding: 15px; border: 1px solid #ddd; margin-bottom: 10px;">
              <strong>Title:</strong><br/>
              <input type="text" placeholder="Enter task title" style="width: 100%; padding: 5px; box-sizing: border-box;"/>
            </div>
            <div class="wireframe-item" style="padding: 15px; border: 1px solid #ddd; margin-bottom: 10px;">
              <strong>State:</strong><br/>
              <select style="width: 100%; padding: 5px; box-sizing: border-box;">
                <option>-- Select State --</option>
                <option>To Do</option>
                <option>In Progress</option>
                <option>Done</option>
              </select>
            </div>
          </div>
          <div style="text-align: center; margin-top: 20px">
            <div class="wireframe-button">Apply Filters</div>
            <div class="wireframe-button-secondary">Clear Filters</div>
          </div>
        </div>
      </div>
      <div class="wireframe-footer">
        © 2026 mb-backlog | Privacy | Terms
      </div>
    </div>
  </body>
</html>
