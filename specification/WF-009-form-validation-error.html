<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      mb-backlog - Form Validation Error - 1.0
    </title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="wireframe-container">
      <div class="wireframe-header">
        <div class="wireframe-logo">mb-backlog</div>
        <div class="wireframe-nav">
          <div>Dashboard</div>
          <div>Tasks</div>
          <div>Settings</div>
        </div>
      </div>
      <div class="wireframe-main">
        <div class="wireframe-content">
          <div class="wireframe-section">
            <div class="wireframe-section-header">
              <div class="wireframe-section-title">Create New Task</div>
              <div class="wireframe-section-action"><a href="#">Cancel</a></div>
            </div>
            <div style="padding: 15px; background-color: #fee; border: 1px solid #fcc; color: #c00; margin-bottom: 15px; border-radius: 4px;">
              <strong>Error:</strong> The following fields are required:
              <ul style="margin: 10px 0 0 20px;">
                <li>State is required</li>
              </ul>
            </div>
            <form style="padding: 20px;">
              <div class="wireframe-item" style="margin-bottom: 15px;">
                <label><strong>Code (Required):</strong></label><br/>
                <input type="text" value="TASK-099" style="width: 100%; padding: 8px; box-sizing: border-box;"/>
              </div>
              <div class="wireframe-item" style="margin-bottom: 15px;">
                <label><strong>Title (Required):</strong></label><br/>
                <input type="text" value="New Task" style="width: 100%; padding: 8px; box-sizing: border-box;"/>
              </div>
              <div class="wireframe-item" style="margin-bottom: 15px;">
                <label><strong>State (Required):</strong></label><br/>
                <select style="width: 100%; padding: 8px; box-sizing: border-box; border: 2px solid #f00;">
                  <option>-- Select State --</option>
                  <option>To Do</option>
                  <option>In Progress</option>
                  <option>Done</option>
                </select>
              </div>
              <div class="wireframe-item" style="margin-bottom: 15px;">
                <label><strong>Description (Optional):</strong></label><br/>
                <textarea placeholder="Enter task description" style="width: 100%; padding: 8px; box-sizing: border-box; height: 100px;"></textarea>
              </div>
            </form>
          </div>
          <div style="text-align: center; margin-top: 20px">
            <div class="wireframe-button">Save Task</div>
            <div class="wireframe-button-secondary">Cancel</div>
          </div>
        </div>
      </div>
      <div class="wireframe-footer">
        © 2026 mb-backlog | Privacy | Terms
      </div>
    </div>
  </body>
</html>
