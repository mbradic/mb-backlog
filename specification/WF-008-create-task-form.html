<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mb-backlog - Create Task Form - 1.0</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="wireframe-container">
      <div class="wireframe-header">
        <div class="wireframe-logo">mb-backlog</div>
        <div class="wireframe-nav">
          <div>Tasks</div>
        </div>
      </div>
      <div class="wireframe-main">
        <div class="wireframe-content">
          <div class="wireframe-section">
            <div class="wireframe-section-header">
              <div class="wireframe-section-title">Create New Task</div>
              <div class="wireframe-section-action"><a href="#">Cancel</a></div>
            </div>
            <form style="padding: 20px">
              <div class="wireframe-item" style="margin-bottom: 15px">
                <label><strong>Code (Required):</strong></label
                ><br />
                <input
                  type="text"
                  placeholder="Enter task code"
                  style="width: 100%; padding: 8px; box-sizing: border-box"
                />
              </div>
              <div class="wireframe-item" style="margin-bottom: 15px">
                <label><strong>Title (Required):</strong></label
                ><br />
                <input
                  type="text"
                  placeholder="Enter task title"
                  style="width: 100%; padding: 8px; box-sizing: border-box"
                />
              </div>
              <div class="wireframe-item" style="margin-bottom: 15px">
                <label><strong>State (Required):</strong></label
                ><br />
                <select
                  style="width: 100%; padding: 8px; box-sizing: border-box"
                >
                  <option>-- Select State --</option>
                  <option>To Do</option>
                  <option>In Progress</option>
                  <option>Done</option>
                </select>
              </div>
              <div class="wireframe-item" style="margin-bottom: 15px">
                <label><strong>Description (Optional):</strong></label
                ><br />
                <textarea
                  placeholder="Enter task description"
                  style="
                    width: 100%;
                    padding: 8px;
                    box-sizing: border-box;
                    height: 100px;
                  "
                ></textarea>
              </div>
            </form>
          </div>
          <div style="text-align: center; margin-top: 20px">
            <div class="wireframe-button">Save Task</div>
            <div class="wireframe-button-secondary">Cancel</div>
          </div>
        </div>
      </div>
      <div class="wireframe-footer">Tasks: 5 | DB Size: 2.3 KB</div>
    </div>
  </body>
</html>
