<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mb-backlog - Empty Task List - 1.0</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="wireframe-container">
      <div class="wireframe-header">
        <div class="wireframe-logo">mb-backlog</div>
        <div class="wireframe-nav">
          <div>Tasks</div>
        </div>
      </div>
      <div class="wireframe-main">
        <div class="wireframe-content">
          <div class="wireframe-section">
            <div class="wireframe-section-header">
              <div class="wireframe-section-title">My Tasks</div>
              <div class="wireframe-section-action">Create New Task</div>
            </div>
            <div style="text-align: center; padding: 40px; color: #999">
              <p>No tasks yet</p>
              <p>Click "Create New Task" to get started</p>
            </div>
          </div>
        </div>
      </div>
      <div class="wireframe-footer">Tasks: 0 | DB Size: 0.5 KB</div>
    </div>
  </body>
</html>
