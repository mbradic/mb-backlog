<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Executive Summary Review - Requirements Specification</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .review-container {
        display: flex;
        gap: 20px;
        margin-top: 20px;
      }

      .review-document {
        flex: 1;
        border: 2px solid #ddd;
        border-radius: 4px;
        overflow: hidden;
      }

      .review-document iframe {
        width: 100%;
        height: 600px;
        border: none;
      }

      .review-form {
        flex: 1;
        background: #f9f9f9;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 4px;
      }

      .review-form h3 {
        margin-top: 0;
        color: #333;
        border-bottom: 2px solid #007bff;
        padding-bottom: 10px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
      }

      .radio-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .radio-group label {
        display: flex;
        align-items: center;
        margin-bottom: 0;
        font-weight: normal;
        cursor: pointer;
      }

      .radio-group input[type="radio"] {
        margin-right: 8px;
        cursor: pointer;
      }

      .comments-field {
        display: none;
      }

      .comments-field.visible {
        display: block;
      }

      .comments-field textarea {
        width: 100%;
        height: 150px;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-family: Arial, sans-serif;
        font-size: 14px;
        resize: vertical;
      }

      .button-group {
        display: flex;
        gap: 10px;
        margin-top: 30px;
      }

      button {
        flex: 1;
        padding: 10px 20px;
        font-size: 14px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
      }

      .btn-download {
        background-color: #28a745;
        color: white;
      }

      .btn-download:hover {
        background-color: #218838;
      }

      .btn-reset {
        background-color: #6c757d;
        color: white;
      }

      .btn-reset:hover {
        background-color: #5a6268;
      }

      .status-message {
        margin-top: 15px;
        padding: 10px;
        border-radius: 4px;
        display: none;
        font-size: 14px;
      }

      .status-message.success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
        display: block;
      }

      .status-message.error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
        display: block;
      }

      @media (max-width: 1200px) {
        .review-container {
          flex-direction: column;
        }

        .review-document iframe {
          height: 400px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2 id="executive-summary-review">Executive Summary Review</h2>
      <p>
        Please review the Executive Summary document displayed on the left. Select your approval status and provide comments if needed.
      </p>

      <div class="review-container">
        <div class="review-document">
          <iframe src="01-executive-summary.html" title="Executive Summary Document"></iframe>
        </div>

        <div class="review-form">
          <h3>Review Form</h3>
          <form id="reviewForm">
            <div class="form-group">
              <label>Approval Status *</label>
              <div class="radio-group">
                <label>
                  <input type="radio" name="status" value="Approved" required />
                  Approved
                </label>
                <label>
                  <input type="radio" name="status" value="Needs Revision" />
                  Needs Revision
                </label>
                <label>
                  <input type="radio" name="status" value="Rejected" />
                  Rejected
                </label>
              </div>
            </div>

            <div class="form-group comments-field" id="commentsField">
              <label for="comments">Comments</label>
              <textarea
                id="comments"
                name="comments"
                placeholder="Please provide detailed feedback..."
              ></textarea>
            </div>

            <div class="button-group">
              <button type="button" class="btn-download" onclick="downloadReview()">
                Download JSON
              </button>
              <button type="reset" class="btn-reset">Clear Form</button>
            </div>

            <div class="status-message" id="statusMessage"></div>
          </form>
        </div>
      </div>
    </div>

    <script>
      const statusRadios = document.querySelectorAll('input[name="status"]');
      const commentsField = document.getElementById("commentsField");
      const commentsTextarea = document.getElementById("comments");
      const reviewForm = document.getElementById("reviewForm");

      // Handle approval status change
      statusRadios.forEach((radio) => {
        radio.addEventListener("change", function () {
          if (this.value === "Approved") {
            commentsField.classList.remove("visible");
            commentsTextarea.removeAttribute("required");
            commentsTextarea.value = "";
          } else {
            commentsField.classList.add("visible");
            commentsTextarea.setAttribute("required", "required");
          }
        });
      });

      // Download review as JSON
      function downloadReview() {
        // Validate form
        const selectedStatus = document.querySelector('input[name="status"]:checked');
        if (!selectedStatus) {
          showMessage("Please select an approval status.", "error");
          return;
        }

        const status = selectedStatus.value;
        const comments = commentsTextarea.value.trim();

        // Validate comments if not approved
        if (status !== "Approved" && comments === "") {
          showMessage("Please provide comments for " + status + " status.", "error");
          return;
        }

        // Create review data object
        const reviewData = {
          documentName: "Executive Summary",
          documentVersion: "{{SPECIFICATION_VERSION}}",
          reviewDate: new Date().toISOString(),
          owner: {
            status: status,
            comments: status === "Approved" ? "" : comments,
          },
        };

        // Convert to JSON string
        const jsonString = JSON.stringify(reviewData, null, 2);

        // Create blob and download
        const blob = new Blob([jsonString], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "01-executive-summary-review.json";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);

        showMessage("Review downloaded successfully!", "success");
      }

      function showMessage(message, type) {
        const statusMessage = document.getElementById("statusMessage");
        statusMessage.textContent = message;
        statusMessage.className = "status-message " + type;
        setTimeout(() => {
          statusMessage.className = "status-message";
        }, 5000);
      }

      // Reset comments field when form is reset
      reviewForm.addEventListener("reset", function () {
        commentsField.classList.remove("visible");
        commentsTextarea.removeAttribute("required");
      });
    </script>
  </body>
</html>
