<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      [Application name] - [Wireframe Title] - [Specification Version]
    </title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="wireframe-container">
      <div class="wireframe-header">
        <div class="wireframe-logo">[App Logo/Name]</div>
        <div class="wireframe-nav">
          <div>[Nav Item 1]</div>
          <div>[Nav Item 2]</div>
          <div>[Nav Item 3]</div>
        </div>
      </div>
      <div class="wireframe-main">
        <div class="wireframe-content">
          <div class="wireframe-section">
            <div class="wireframe-section-header">
              <div class="wireframe-section-title">[Page Section Title]</div>
              <div class="wireframe-section-action">[Action]</div>
            </div>
            <div class="wireframe-item">[Content Area 1]</div>
            <div class="wireframe-item">[Content Area 2]</div>
          </div>
          <div style="text-align: center; margin-top: 20px">
            <div class="wireframe-button">[Action Button]</div>
            <div class="wireframe-button-secondary">[Secondary Button]</div>
          </div>
        </div>
      </div>
      <div class="wireframe-footer">
        © [Year] [Company Name] | [Footer Links]
      </div>
    </div>
  </body>
</html>
